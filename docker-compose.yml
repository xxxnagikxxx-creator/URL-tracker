services:
  db:
    image: postgres:16-alpine
    container_name: live_checker_db
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-live_checker}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-live_checker}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: live_checker_redis
    restart: always
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:-redis_pass}
    command: /bin/sh -c 'redis-server --requirepass "$$REDIS_PASSWORD"'
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redis_pass}", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  migrate:
    build: .
    container_name: live_checker_migrate
    command: alembic upgrade head
    env_file:
      - .env
    environment:
      - DB_HOST=db
      - REDIS_HOST=redis
    depends_on:
      db:
        condition: service_healthy

  api:
    build: .
    container_name: live_checker_api
    restart: always
    command: uvicorn src.main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - .:/app  
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - DB_HOST=db
      - REDIS_HOST=redis
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy

  worker:
    build: .
    container_name: live_checker_worker
    restart: always
    command: arq src.live_checker.worker.WorkerSettings
    volumes:
      - .:/app
    env_file:
      - .env
    environment:
      - DB_HOST=db
      - REDIS_HOST=redis
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy

  bot:
    build: .
    container_name: live_checker_bot
    restart: always
    command: python -m src.bot.bot
    volumes:
      - .:/app
    env_file:
      - .env
    environment:
      - DB_HOST=db
      - REDIS_HOST=redis
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy

  frontend:
    image: node:22-alpine
    container_name: live_checker_frontend
    restart: always
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    volumes:
      - ./frontend:/app
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=${VITE_API_URL:-http://localhost:8000}
      - VITE_TELEGRAM_BOT_USERNAME=${TELEGRAM_BOT_USERNAME:-testivecheckerbot}
    depends_on:
      - api

volumes:
  postgres_data:
  redis_data: